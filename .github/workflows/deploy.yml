name: DevOps Modern End-to-End CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  devops-pipeline:
    name: Build, Validate and Test Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Java application
        working-directory: java-app
        run: mvn clean package -DskipTests

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Build Portfolio Docker image
        run: docker build -t japhtech/japhet-portfolio:latest ./portfolio-app

      - name: Build Java Docker image
        run: docker build -t japhtech/japhet-java-app:latest ./java-app

      - name: Run applications with Docker Compose
        run: docker compose up -d --build

      - name: Show running containers
        run: docker ps

      - name: Verify Portfolio application
        run: |
          sleep 15
          curl -f http://localhost:8081 || exit 1

      - name: Verify Java application container
        run: |
          sleep 30
          docker ps
          docker compose logs
          echo "Java application container verification completed"

      - name: Stop Docker Compose
        if: always()
        run: docker compose down

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate Terraform configuration
        working-directory: terraform
        run: |
          terraform fmt -check
          terraform init -backend=false
          terraform validate

      - name: Install Ansible
        run: pip install ansible

      - name: Validate Ansible playbook
        working-directory: ansible
        run: ansible-playbook --syntax-check playbook.yml

      - name: Validate Kubernetes manifests
        run: kubectl apply --dry-run=client -f k8s/
