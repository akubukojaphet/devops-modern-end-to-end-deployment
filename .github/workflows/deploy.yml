name: DevOps Final Project Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Java application
        working-directory: java-app
        run: mvn clean package

      - name: Build Docker images
        run: |
          docker build -t japhtech/japhet-portfolio:latest ./portfolio-app
          docker build -t japhtech/japhet-java-app:latest ./java-app

      - name: Verify Docker Compose config
        run: docker compose config
