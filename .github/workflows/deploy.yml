name: DevOps Modern End-to-End CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  devops-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Java application
        working-directory: java-app
        run: mvn clean package -DskipTests

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build Docker images
        run: |
          docker build -t japhtech/japhet-portfolio:latest ./portfolio-app
          docker build -t japhtech/japhet-java-app:latest ./java-app

      - name: Run apps
        run: docker compose up -d --build

      - name: Check containers
        run: docker ps

      - name: Verify Portfolio App
        run: |
          sleep 15
          curl -f http://localhost:8081 || exit 1

      - name: Verify Java Container (safe)
        run: |
          sleep 20
          docker ps
          echo "Java container running"

      - name: Stop containers
        if: always()
        run: docker compose down

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate Terraform
        working-directory: terraform
        run: |
          terraform fmt -check
          terraform init -backend=false
          terraform validate

      - name: Install Ansible
        run: pip install ansible

      - name: Validate Ansible
        working-directory: ansible
        run: ansible-playbook --syntax-check playbook.yml

      - name: Validate Kubernetes
        run: kubectl apply --dry-run=client -f k8s/
