---
- name: Deploy DevOps Final Project Applications
  hosts: all
  become: yes

  tasks:
    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - docker.io
          - docker-compose
          - python3-pip
        state: present

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Create application directory
      file:
        path: /opt/devops-final-project
        state: directory
        mode: "0755"

    - name: Copy project files to server
      copy:
        src: ../
        dest: /opt/devops-final-project/
        mode: "0755"

    - name: Run applications with Docker Compose
      command: docker compose up -d --build
      args:
        chdir: /opt/devops-final-project
